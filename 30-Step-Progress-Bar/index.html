<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Progress Bar</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
    <div class="container">
        <div class="progress-container">
            <div class="step-1"><small class="step-1-text"></small></div>
            <div class="step-2"><small class="step-2-text step-2-checked"></small></div>
            <div class="step-3"><small class="step-3-text step-3-checked"></small></div>
            <div class="step-4"><small class="step-4-text step-4-checked"></small></div>
            <div class="step-5"><small class="step-5-text step-5-checked"></small></div>
            <hr id="progress-bar-back" />
            <hr id="progress-bar-front" style="width: 0%;">
        </div>
        <div class="btn-container">
            <button id="previous-step-btn">&larr;</button>
            <button id="next-step-btn">&rarr;</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
